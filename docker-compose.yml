services:
  gateway:
    build: .
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "${DOCKER_GID:-999}"
    restart: unless-stopped
    networks:
      - mcp-net

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${MCP_PORT:-80}:80"
    depends_on:
      - gateway
    restart: unless-stopped
    networks:
      - mcp-net

networks:
  mcp-net:
    driver: bridge
