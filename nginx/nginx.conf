# Rate limiting zone
limit_req_zone $binary_remote_addr zone=mcp_limit:10m rate=30r/m;

server {
    listen 80;
    server_name _;

    # IP Whitelist — uncomment and replace with your Claude Code machine's IP
    # allow 1.2.3.4;
    # deny all;

    # Rate limiting
    limit_req zone=mcp_limit burst=10 nodelay;

    # SSE keepalive
    proxy_read_timeout 3600s;
    keepalive_timeout 3600s;

    location /health {
        proxy_pass http://gateway:3000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /mcp {
        proxy_pass http://gateway:3000/mcp;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE headers
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding on;
        proxy_buffering off;
        proxy_cache off;
    }
}
